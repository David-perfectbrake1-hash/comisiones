<!-- =========================================
     ESTRUCTURA PRINCIPAL (HTML5 SEMÁNTICO)
     ========================================= -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Viewport esencial para responsive en móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Comisiones</title>
    <!-- Enlace a la hoja de estilos -->
    <link rel="stylesheet" href="ventas.css">
</head>
<body>

    <main class="calculadora-container">
        <!-- ========== ENCABEZADO ========== -->
        <header class="calculadora-header">
            <h1>Calculadora de Comisiones</h1>
            <p>Ingresa los datos para calcular tu pago mensual</p>
        </header>

        <!-- ========== FORMULARIO DE ENTRADA ========== -->
        <section class="formulario-seccion">
            <div class="campo-grupo">
                <label for="txtSueldoBase">Salario Base ($)</label>
                <input type="number" id="txtSueldoBase" placeholder="Ej: 15000" step="0.01" inputmode="decimal" onblur="validateSueldoBase()">
                <span id="errorSueldoBase" class="error-message"></span>
            </div>

            <div class="campo-grupo">
                <label for="txtVentas">Número de ventas</label>
                <input type="number" id="txtVentas" placeholder="Ej: 8" step="1" inputmode="numeric" onblur="validateVentas()">
                <span id="errorVentas" class="error-message"></span>
            </div>

            <div class="campo-grupo">
                <label for="txtPrecio">Precio del producto ($)</label>
                <input type="number" id="txtPrecio" placeholder="Ej: 2000" step="0.01" inputmode="decimal" onblur="validatePrecio()">
                <span id="errorPrecio" class="error-message"></span>
            </div>

            <button type="button" class="btn-calcular" onclick="calcular()">Calcular Comisión</button>
        </section>

        <!-- ========== SECCIÓN DE RESULTADOS ========== -->
        <section class="resultados-panel">
            <h2>Resultados</h2>
            <div class="resultados-grid">
                <div class="resultado-fila">
                    <span class="resultado-etiqueta">Salario Base:</span>
                    <span id="spSueldoBase" class="resultado-dato">$0.00</span>
                </div>
                <div class="resultado-fila">
                    <span class="resultado-etiqueta">Comisión:</span>
                    <span id="spComision" class="resultado-dato">$0.00</span>
                </div>
                <div class="resultado-fila total">
                    <span class="resultado-etiqueta">Total:</span>
                    <span id="spTotal" class="resultado-dato">$0.00</span>
                </div>
            </div>
        </section>
    </main>

    <!-- Enlace a los archivos de lógica -->
    <script src="utilitarios.js"></script>
    <script src="ventas.js"></script>
</body>
</html>
